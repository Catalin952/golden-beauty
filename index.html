<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Beauty</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

header {
  background: black;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  color: gold;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 40px;
}

.hero h1 {
  font-size: 28px;
}

.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.product {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: gold;
  margin: 10px 0;
}

button {
  background: gold;
  border: none;
  padding: 10px;
  width: 100%;
  cursor: pointer;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<header>Golden Beauty</header>

<section class="hero">
  <h1>Extensii de păr & produse cosmetice premium</h1>
  <p>Livrare în toată Europa</p>
</section>

<section class="products">

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Extensii păr natural</h3>
<p class="price">250 RON</p>
<button onclick="order('Extensii păr natural - 250 RON')">Comandă</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Extensii clip-on</h3>
<p class="price">180 RON</p>
<button onclick="order('Extensii clip-on - 180 RON')">Comandă</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Șampon profesional</h3>
<p class="price">60 RON</p>
<button onclick="order('Șampon profesional - 60 RON')">Comandă</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Ulei pentru păr</h3>
<p class="price">45 RON</p>
<button onclick="order('Ulei pentru păr - 45 RON')">Comandă</button>
</div>

</section>

<footer>
© 2026 Golden Beauty | Comenzi WhatsApp: 0799399592
</footer>

<script>
function order(product) {
  let phone = "40799399592";
  let message = "Bună! Vreau să comand: " + product;
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
